# API Gateway Configuration
server.port=8080

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=1800000

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=false

# Gateway Global Timeout Configuration
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=5s

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.cts.gateway=DEBUG

# ========================================
# GATEWAY ROUTES CONFIGURATION
# ========================================

# Route 0: Auth Endpoints - Public (no token required)
spring.cloud.gateway.routes[0].id=auth-public
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/register, /api/auth/login, /api/auth/admin/register, /api/auth/admin/login

# Route 1: User Only Endpoints (/api/user/**) - USER role required
spring.cloud.gateway.routes[1].id=user-endpoints
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# Route 2: Admin Only Endpoints (/api/admin/**) - ADMIN role required
spring.cloud.gateway.routes[2].id=admin-endpoints
spring.cloud.gateway.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# Route 3: Both User and Admin Endpoints (/api/both/**) - USER or ADMIN role required
spring.cloud.gateway.routes[3].id=both-endpoints
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/both/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# Route 4: Cart Service Direct Endpoints
spring.cloud.gateway.routes[4].id=cart-direct
spring.cloud.gateway.routes[4].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[4].filters[1]=CircuitBreaker=name=cartCircuitBreaker,fallbackUri=forward:/fallback/cart

# Route 5: Product Service Endpoints
spring.cloud.gateway.routes[5].id=product-service
spring.cloud.gateway.routes[5].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/products,/api/products/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[5].filters[1]=CircuitBreaker=name=productCircuitBreaker,fallbackUri=forward:/fallback/product

# Circuit Breaker Configuration
spring.cloud.gateway.routes[1].filters[1]=CircuitBreaker=name=userCircuitBreaker,fallbackUri=forward:/fallback/user
spring.cloud.gateway.routes[2].filters[1]=CircuitBreaker=name=adminCircuitBreaker,fallbackUri=forward:/fallback/admin
spring.cloud.gateway.routes[3].filters[1]=CircuitBreaker=name=bothCircuitBreaker,fallbackUri=forward:/fallback/both
